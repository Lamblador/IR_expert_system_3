# Справочник полос: функциональные группы, органические связи, примеры неорганических / гетероатомов.
# range_* в см⁻¹; smarts — паттерн RDKit; applicability — organic | inorganic | both

bands:
  - band_id: oh_alcohol
    group: hydroxyl
    atom_pair: O-H
    vibration_type: stretch
    range_min_cm1: 3200
    range_max_cm1: 3650
    typical_intensity: strong_broad
    intensity_reliability: medium
    smarts: "[OX2H]"
    applicability: organic
    notes: "Широкая полоса спиртов; водородные связи."
    source: "correlation charts"

  - band_id: nh_stretch
    group: amine
    atom_pair: N-H
