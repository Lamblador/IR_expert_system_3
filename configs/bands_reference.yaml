    intensity_reliability: medium
    smarts: "[NX3;H2,H1]"
    applicability: organic
    notes: "NH/NH2 аминов (табл. ru.wikipedia: NH2 3500—3300; NH 3450—3300). Пересечение с амидами."
    source: "correlation charts; ru.wikipedia IR table"

  - band_id: ch_sp3
